name: Build

on:
  push:
    branches: [master]
    tags:     ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python + Pillow ──────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install pillow

      # ── 3. Generate icon ────────────────────────────────────────────────────
      - name: Generate icon
        run: python generate_icon.py

      # ── 4. MSVC environment ─────────────────────────────────────────────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC dev cmd (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 5. Compile resource + EXE ───────────────────────────────────────────
      - name: Compile EXE
        run: |
          rc.exe /nologo app.rc
          cl.exe /O2 /W3 /EHsc /DUNICODE /D_UNICODE /DWIN32 /D_WINDOWS /nologo `
            main.cpp app.res `
            /Fe:ContraryValorantTTS.exe `
            /link user32.lib gdi32.lib gdiplus.lib sapi.lib ole32.lib `
                  shell32.lib kernel32.lib `
            /SUBSYSTEM:WINDOWS

      # ── 6. Install NSIS ─────────────────────────────────────────────────────
      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      # ── 7. Prepare installer assets ─────────────────────────────────────────
      - name: Prepare installer assets
        run: Copy-Item LICENSE LICENSE_INSTALLER.txt

      # ── 8. Build installer ──────────────────────────────────────────────────
      - name: Build installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      # ── 9. Upload artifacts (always) ────────────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ContraryValorantTTS-exe
          path: ContraryValorantTTS.exe

      - name: Upload Setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ContraryValorantTTS-Setup
          path: ContraryValorantTTS-Setup.exe

      # ── 10. Draft release on every master push ───────────────────────────────
      # Deletes any previous draft named "latest-build" and creates a fresh one
      - name: Delete previous draft release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $drafts = gh release list --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' 2>$null
          foreach ($tag in $drafts) {
            if ($tag -eq "latest-build") {
              gh release delete "latest-build" --yes 2>$null
              git push origin --delete "latest-build" 2>$null
            }
          }

      - name: Create draft release (master push)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "latest-build" `
            --title "Latest Build (draft)" `
            --notes "Auto-built from master. Not a stable release." `
            --draft `
            ContraryValorantTTS.exe `
            ContraryValorantTTS-Setup.exe

      # ── 11. Stable release on version tag (v*) ──────────────────────────────
      - name: Create stable release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ContraryValorantTTS.exe
            ContraryValorantTTS-Setup.exe
          generate_release_notes: true
          draft: false
